name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy matplotlib scikit-learn torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest scikit-optimize gpytorch botorch openpyxl

      - name: Run tests
        run: pytest tests/ -v

      - name: End-to-end dry run
        run: |
          python composite_design_v19.py \
            --dry_run \
            --data_dir tests/fixtures \
            --output_dir results_ci_dry \
            --force_cpu

      - name: Verify dry-run outputs
        run: |
          test -f results_ci_dry/MANIFEST_outputs.csv
          test -f results_ci_dry/Table1_forward_results.csv
          test -f results_ci_dry/run_log.txt
          echo "Dry-run produced $(wc -l < results_ci_dry/MANIFEST_outputs.csv) manifest entries"
