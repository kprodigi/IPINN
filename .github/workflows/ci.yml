name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy matplotlib scikit-learn torch pytest scikit-optimize gpytorch botorch
      - name: Pytest (smoke)
        run: pytest tests/ -q
      - name: End-to-end dry run (tiny fixture)
        run: |
          python composite_design_v19.py --dry_run --data_dir tests/fixtures --output_dir results_ci_dry --force_cpu
