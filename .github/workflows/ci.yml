name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Constrained to the ranges declared in pyproject.toml so CI cannot
          # silently drift from the declared dependency set.
          pip install "numpy>=1.26,<3" "pandas>=2" "scipy>=1.11" "matplotlib>=3.8" \
                      "scikit-learn>=1.3,<2" pytest "scikit-optimize>=0.10.1" openpyxl

      - name: Run tests
        run: pytest tests/ -v

      - name: End-to-end dry run
        run: |
          python composite_design.py \
            --dry_run \
            --data_dir tests/fixtures \
            --output_dir results_ci_dry \
            --force_cpu

      - name: Verify dry-run outputs
        run: |
          test -f results_ci_dry/MANIFEST_outputs.csv
          test -f results_ci_dry/Table1_forward_results.csv
          test -f results_ci_dry/run_log.txt
          # Inverse-design artifacts: the dry run must exercise the inverse
          # path (coarse-grid stub) and emit the ground-truth recovery table.
          test -f results_ci_dry/Table3_inverse_design.csv
          grep -q "True_theta_deg" results_ci_dry/Table3_inverse_design.csv
          grep -q "Delta_theta_deg" results_ci_dry/Table3_inverse_design.csv
          # Design-level forward validation artifacts.
          test -f results_ci_dry/Table_forward_design_errors.csv
          test -f results_ci_dry/Table_null_baseline_design_level.csv
          test -f results_ci_dry/Table_physical_plausibility_audit.csv
          # Table 1 content sanity: header + at least one finite Load_R2 value.
          python - <<'EOF'
          import pandas as pd, numpy as np
          t1 = pd.read_csv("results_ci_dry/Table1_forward_results.csv")
          assert "Load_R2" in t1.columns and len(t1) >= 1
          assert np.isfinite(t1["Load_R2"].astype(float)).all()
          t3 = pd.read_csv("results_ci_dry/Table3_inverse_design.csv")
          assert len(t3) >= 1 and t3["GPBO_Angle"].astype(float).between(40, 75).all()
          print("Dry-run content checks passed")
          EOF
          echo "Dry-run produced $(wc -l < results_ci_dry/MANIFEST_outputs.csv) manifest entries"
