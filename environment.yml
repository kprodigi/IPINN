# Conda environment for reproducible paper runs (adjust torch/cuda index as needed).
name: ipinn-crash
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip
  - numpy>=1.26,<3
  - pandas>=2,<3
  - scipy>=1.11,<2
  - matplotlib>=3.8,<4
  - scikit-learn>=1.3,<2
  - pytest>=7.4
  - pip:
    - torch>=2.1,<3
    - gpytorch>=1.11
    - botorch>=0.9.2
    - scikit-optimize>=0.10.1
